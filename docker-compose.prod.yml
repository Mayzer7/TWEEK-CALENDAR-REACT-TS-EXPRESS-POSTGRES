services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mayzer # ОБЯЗАТЕЛЬНО СМЕНИТЬ В .env
      POSTGRES_DB: calendar_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calendar_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - ./backend/.env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:mayzer@db:5432/calendar_db
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "80:80" # В продакшене фронтенд обычно на 80 (или 443) порту
    depends_on:
      - backend

volumes:
  pg_data:
